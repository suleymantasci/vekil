version: '3.8'

services:
  vekil-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vekil-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - NODE_ENV=production
    networks:
      - vekil-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vekil-server.rule=Host(`vekil.tasci.cloud`)"
      - "traefik.http.routers.vekil-server.entrypoints=websecure"
      - "traefik.http.routers.vekil-server.tls=true"
      - "traefik.http.routers.vekil-server.tls.certresolver=letsencrypt"
      - "traefik.http.services.vekil-server.loadbalancer.server.port=3001"

  vekil-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: vekil-client
    restart: unless-stopped
    depends_on:
      - vekil-server
    environment:
      - NEXT_PUBLIC_API_URL=https://vekil.tasci.cloud/api/v1
      - NEXT_PUBLIC_APP_URL=https://vekil.tasci.cloud
    networks:
      - vekil-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vekil-client.rule=Host(`vekil.tasci.cloud`)"
      - "traefik.http.routers.vekil-client.entrypoints=websecure"
      - "traefik.http.routers.vekil-client.tls=true"
      - "traefik.http.routers.vekil-client.tls.certresolver=letsencrypt"
      - "traefik.http.services.vekil-client.loadbalancer.server.port=3000"

networks:
  vekil-network:
    external: false